  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{color:#9AA6A2;}\n  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background: #FBF7F0; min-height: 100vh; width: 100%; overflow-x: hidden; position: absolute; left: -7px; top: 1px\">\n\n  <!-- UTILITY BAR -->\n  <div style=\"background:#163C50;color:#C3D6E0;font-size:13px;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:8px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"color:#F4C95D;display:flex;\"><\u002Fspan>\n        \n        \n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap;\">\n        <span style=\"opacity:.65;margin-right:4px;\">Read in<\u002Fspan>\n        <sc-for list=\"{{ languages }}\" as=\"lng\" hint-placeholder-count=\"5\">\n          <span onclick=\"{{ lng.onSelect }}\" style=\"{{ lng.style }}\">{{ lng.label }}<\u002Fspan>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ showLangNote }}\" hint-placeholder-val=\"\">\n        <span style=\"opacity:.6;margin-left:6px;display:inline-flex;align-items:center;gap:5px;font-size:12px;\"><i data-lucide=\"languages\" width=\"13\" height=\"13\"><\u002Fi>via Google Translate<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HEADER -->\n  <header style=\"position:sticky;top:0;z-index:40;background:rgba(251,247,240,0.88);backdrop-filter:blur(10px);border-bottom:1px solid #ECE3D4;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <a onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer;\">\n        <img src=\"a047683b-4c0b-49ff-8cf2-67201d327e92\" alt=\"Our Airdrie\" width=\"42\" height=\"42\" style=\"display:block;border-radius:50%;box-shadow:0 3px 10px rgba(23,52,69,.18);\">\n        <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:21px;letter-spacing:-.02em;\"><span style=\"color:#173445;\">Our<\u002Fspan><span style=\"color:#E8A13C;\">Airdrie<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n      <div onclick=\"{{ goWeather }}\" title=\"Weather &amp; closures\" style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E7DECF;border-radius:999px;padding:6px 12px 6px 9px;cursor:pointer;box-shadow:0 2px 6px rgba(23,52,69,.06);white-space:nowrap;\">\n        <span style=\"color:#E8A13C;display:flex;\"><i data-lucide=\"cloud-sun\" width=\"20\" height=\"20\"><\u002Fi><\u002Fspan>\n        <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;color:#173445;\">22°C<\u002Fspan>\n        <span style=\"font-size:13px;color:#7B847F;\">Sunny<\u002Fspan>\n        <span style=\"color:#B6BEBA;display:flex;\"><i data-lucide=\"chevron-right\" width=\"15\" height=\"15\"><\u002Fi><\u002Fspan>\n      <\u002Fdiv><nav style=\"display:flex;align-items:center;gap:6px;font-size:14.5px;\">\n        <a onclick=\"{{ goHome }}\" style=\"{{ navHome }}\">Home<\u002Fa>\n        <a onclick=\"{{ goDirectory }}\" style=\"{{ navDirectory }}\">Directory<\u002Fa>\n        <a onclick=\"{{ goEvents }}\" style=\"{{ navEvents }}\">Events<\u002Fa>\n        <a onclick=\"{{ goResources }}\" style=\"{{ navResources }}\">Resources<\u002Fa>\n        <a onclick=\"{{ goGarbage }}\" style=\"{{ navGarbage }}\">Garbage<\u002Fa>\n        <a onclick=\"{{ goTransit }}\" style=\"{{ navTransit }}\">Transit<\u002Fa>\n        <a onclick=\"{{ goAbout }}\" style=\"{{ navAbout }}\">About<\u002Fa>\n        <a onclick=\"{{ goVolunteer }}\" style=\"{{ navVolunteer }}\">Volunteer Airdrie<\u002Fa>\n      <\u002Fnav>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"\">\n      <span onclick=\"{{ toggleMenu }}\" style=\"display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;background:#E7EEF3;color:#1E5677;cursor:pointer;flex-shrink:0;\"><i data-lucide=\"menu\" width=\"22\" height=\"22\"><\u002Fi><\u002Fspan>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"\">\n    <div style=\"border-top:1px solid #ECE3D4;background:rgba(251,247,240,0.98);\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:10px 18px 18px;display:flex;flex-direction:column;gap:3px;\">\n        <a onclick=\"{{ goHome }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">Home<\u002Fa>\n        <a onclick=\"{{ goDirectory }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">Directory<\u002Fa>\n        <a onclick=\"{{ goEvents }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">Events<\u002Fa>\n        <a onclick=\"{{ goResources }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">Resources<\u002Fa>\n        <a onclick=\"{{ goGarbage }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">Garbage<\u002Fa>\n        <a onclick=\"{{ goTransit }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">Transit<\u002Fa>\n        <a onclick=\"{{ goAbout }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">About<\u002Fa>\n        <a onclick=\"{{ goVolunteer }}\" style=\"padding:13px 14px;border-radius:10px;font-weight:600;font-size:16px;color:#173445;cursor:pointer;\">Volunteer Airdrie<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <!-- HERO -->\n  <section style=\"max-width:1200px;margin:0 auto;padding:30px 28px 14px;\">\n    <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:24px;\">\n      \n    <\u002Fdiv>\n\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(40px,8.5vw,80px);line-height:1.02;letter-spacing:-.035em;color:#173445;margin:0;text-wrap:balance;\">Everything Airdrie, in one friendly place.<\u002Fh1>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,360px),1fr));gap:40px;align-items:start;margin-top:30px;\">\n      <div>\n        \n        <p style=\"font-size: 18px; line-height: 1.55; color: #52605C; margin: 0 0 22px; max-width: 480px;\">Local businesses, events, transit, garbage pickup and free resources, ask in plain English and get a real answer.<\u002Fp>\n        <div style=\"display:flex;gap:28px;margin:0 0 22px;flex-wrap:wrap;\">\n          <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:28px;color:#173445;letter-spacing:-.02em;\">3,700+<\u002Fdiv><div style=\"font-size:13px;color:#6B7672;font-weight:500;\">Local businesses<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#E3DACB;\"><\u002Fdiv>\n          <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:28px;color:#173445;letter-spacing:-.02em;\">80+<\u002Fdiv><div style=\"font-size:13px;color:#6B7672;font-weight:500;\">Local resources<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#E3DACB;\"><\u002Fdiv>\n          <div><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:28px;color:#173445;letter-spacing:-.02em;\">44<\u002Fdiv><div style=\"font-size:13px;color:#6B7672;font-weight:500;\">Neighbourhoods<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#E3DACB;\"><\u002Fdi a-lucide=\"phone\" width=\"14\" height=\"14\"><\u002Fi><\u002Fspan>{{ l.phone }}<\u002Fspan>\n                <span style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:999px;background:{{ l.dotColor }};display:inline-block;flex-shrink:0;\"><\u002Fspan><span style=\"font-weight:600;color:{{ l.dotColor }};\">{{ l.hours }}<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:11px;flex-shrink:0;\">\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:600;color:#173445;\"><span style=\"color:#E8A13C;display:flex;\"><i data-lucide=\"star\" width=\"15\" height=\"15\"><\u002Fi><\u002Fspan>{{ l.rating }}<\u002Fspan>\n              <div style=\"display:flex;gap:8px;\">\n                <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#1E5677;background:#E9F0F5;padding:8px 13px;border-radius:9px;cursor:pointer;\"><i data-lucide=\"phone\" width=\"14\" height=\"14\"><\u002Fi>Call<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#fff;background:#1E5677;padding:8px 13px;border-radius:9px;cursor:pointer;\"><i data-lucide=\"navigation\" width=\"14\" height=\"14\"><\u002Fi>Directions<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:22px;\"><span style=\"display:inline-flex;align-items:center;gap:8px;font-size:14.5px;font-weight:600;color:#1E5677;background:#fff;border:1px solid #E7DECF;padding:12px 22px;border-radius:11px;cursor:pointer;\">Show more results<i data-lucide=\"chevron-down\" width=\"16\" height=\"16\"><\u002Fi><\u002Fspan><\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ dirIsMap }}\" hint-placeholder-val=\" le=\"display:inline-flex;align-items:center;gap:7px;background:#FBEBE2;color:#C2562A;font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;margin-bottom:16px;\"><i data-lucide=\"calendar-days\" width=\"14\" height=\"14\"><\u002Fi>Real, local events only<\u002Fspan>\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(29px,6.5vw,42px);letter-spacing:-.025em;color:#173445;margin:0 0 8px;\">Events Calendar<\u002Fh1>\n    <p style=\"font-size:16.5px;color:#6B7672;margin:0 0 22px;max-width:620px;\">What's happening around Airdrie. Always confirm details with the organizer before heading out.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:26px;\">\n      <sc-for list=\"{{ eventFilters }}\" as=\"f\" hint-placeholder-count=\"7\">\n        <span onclick=\"{{ f.onClick }}\" style=\"{{ f.style }}\">{{ f.label }}<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  \n  <section style=\"max-width:1200px;margin:0 auto;padding:18px 28px 44px;\">\n    <sc-if value=\"{{ evIsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:48px 20px;color:#9AA6A2;background:#fff;border:1px solid #EAE2D3;border-radius:16px;\">\n        <i data-lucide=\"calendar-x\" width=\"30\" height=\"30\"><\u002Fi>\n        <div style=\"font-size:15px;margin-top:10px;\">No events match this filter. Try another category.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div>\n      <sc-for list=\"{{ agendaRows }}\" as=\"row\" hint-placeholder-count=\"8\">\n        <div style=\"{{ row.hdrStyle }}\">\n          <h2 style=\"font-weight:700;font-size:19px;letter-spacing:-.01em;color:#173445;margin:0;\">{{ row.label }}<\u002Fh2>\n          <span style=\"font-size:13px;color:#9AA6A2;font-weight:500;\">{{ row.sub }}<\u002Fspan>\n          <span style=\"margin-left:auto;font-size:12.5px;color:#7B847F;font-weight:600;background:#F1ECE1;padding:3px 10px;border-radius:999px;\">{{ row.count }}<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"javascript:void(0)\" onclick=\"{{ row.onClick }}\" style=\"{{ row.evtStyle }}\">\n          <span style=\"flex-shrink:0;width:56px;text-align:center;background:#FBF7F0;border:1px solid #EFE7D8;border-radius:11px;padding:8px 4px;\">\n            <span style=\"display:block;font-weight:700;font-size:22px;color:#E07A4F;line-height:1;\">{{ row.day }}<\u002Fspan>\n            <span style=\"display:block;font-size:10.5px;color:#9AA6A2;font-weight:600;letter-spacing:.05em;margin-top:2px;\">{{ row.weekday }}<\u002Fspan>\n          <\u002Fspan>\n          <div style=\"flex:1;min-width:0;\">\n            <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:3px;\">\n              <span style=\"font-weight:700;font-size:16px;color:#173445;line-height:1.25;\">{{ row.title }}<\u002Fspan>\n              <span style=\"{{ row.tagStyle }}\">{{ row.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:13px;color:#7B847F;\">\n              <span style=\"display:flex;align-items:center;gap:6px;\"><i data-lucide=\"clock\" width=\"14\" height=\"14\"><\u002Fi>{{ row.time }}<\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:6px;\"><i data-lucide=\"map-pin\" width=\"14\" height=\"14\" style=\"flex-shrink:0;\"><\u002Fi>{{ row.place }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <i data-lucide=\"chevron-right\" width=\"19\" height=\"19\" style=\"flex-shrink:0;color:#C3B9A6;\"><\u002Fi>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EVENT DETAIL PANEL -->\n  <sc-if value=\"{{ showDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDetail }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;\"><\u002Fdiv>\n    <div style=\"position:fixed;right:0;top:0;height:100%;width:min(50 \"><i data-lucide=\"tag\" width=\"16\" height=\"16\" style=\"color:#1E5677;flex-shrink:0;\"></i> {{ detailCost }}</div></sc-if>\n      <sc-if value=\"{{ detailReg }}\"><div style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#46544F;margin-top:6px;\"><i data-lucide=\"clipboard-check\" width=\"16\" height=\"16\" style=\"color:#1E5677;flex-shrink:0;\"></i> {{ detailReg }}</div></sc-if>\n      <sc-if value=\"{{ detailOrg }}\"><div style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#46544F;margin-top:6px;\"><i data-lucide=\"users\" width=\"16\" height=\"16\" style=\"color:#1E5677;flex-shrink:0;\"></i> Organizer: {{ detailOrg }}</div></sc-if>\n      <sc-if value=\"{{ detailUrl }}\"><a href=\"{{ detailUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#1E5677;text-decoration:none;margin-top:8px;\"><i data-lucide=\"external-link\" width=\"16\" height=\"16\" style=\"flex-shrink:0;\"></i> Full details &amp; registration</a></sc-if>\n      <p style=\"font-size:15px;color:#46544F;line-height:1.65;margin:8px 0 0;\">{{ detailDesc }}<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fsc-if>\n\n  <!-- ===================== GARBAGE PAGE ===================== -->\n  <sc-if value=\"{{ isGarbage }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"max-width:1200px;margin:0 auto;padding:38px 28px 6px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:7px;background:#E9F3EC;color:#3F8E6E;font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;margin-bottom:16px;\"><i data-lucide=\"recycle\" width=\"14\" height=\"14\"><\u002Fi>All 44 neighbourhoods covered<\u002Fspan>\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(29px,6.5vw,42px);letter-spacing:-.025em;color:#173445;margin:0 0 8px;\">Garbage &amp; Recycling<\u002Fh1>\n    <p style=\"font-size:16.5px;color:#6B7672;margin:0 0 24px;max-width:620px;\">Airdrie uses neighbourhood-based collection. Find your pickup day, then set carts out by 7 a.m.<\u002Fp>\n  <\u002Fsection>\n  <section style=\"max-width:1200px;margin:0 auto;padding:0 28px 16px;\">\n    <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:18px;padding:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,440px),1fr));gap:24px;align-items:center;\">\n      <div>\n        <label style=\"display:block;font-weight:600;font-size:14px;color:#46544F;margin-bottom:10px;\">Select your neighbourhood<\u002Flabel>\n        <div style=\"position:relative;\">\n          <select value=\"{{ hood }}\" onchange=\"{{ selectHood }}\" style=\"width:100%;appearance:none;font-family:inherit;font-size:15.5px;color:#22302E;background:#FBF7F0;border:1px solid #E0D7C7;border-radius:12px;padding:14px 16px;cursor:pointer;\">\n            <option value=\"\">Choose your neighbourhood<\u002Foption>\n            <sc-for list=\"{{ neighbourhoods }}\" as=\"n\" hint-placeholder-count=\"6\"><option value=\"{{ n }}\">{{ n }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n          <span style=\"position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#8A938E;pointer-events:none;display:flex;\"><i data-lucide=\"chevron-down\" width=\"18\" height=\"18\"><\u002Fi><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:14px 0 0;font-size:13px;color:#8A938E;line-height:1.5;\">Schedules may vary by street. Sign up for exact-week reminders via myAIRDRIE.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#F4F8F6;border:1px solid #E2EFE8;border-radius:14px;padding:22px;\">\n        <sc-if value=\"{{ hoodChosen }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#3F8E6E;margin-bottom:6px;\">{{ hood }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:16px;\"><span style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:30px;color:#173445;\">{{ hoodDay }}<\u002Fspan><span style=\"font-size:14px;color:#7B847F;\">garbage + organics<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:14px;color:#46544F;\">\n            <span style=\"display:flex;align-items:center;gap:9px;\"><span style=\"color:#1E5677;display:flex;\"><i data-lucide=\"trash-2\" width=\"17\" height=\"17\"><\u002Fi><\u002Fspan>Black cart (garbage): {{ hoodDay }}, weekly<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:9px;\"><span style=\"color:#2E7DB0;display:flex;\"><i data-lucide=\"recycle\" width=\"17\" height=\"17\"><\u002Fi><\u002Fspan>Blue cart (recycling): {{ hoodRecycle }}, weekly<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:9px;\"><span style=\"color:#3F8E6E;display:flex;\"><i data-lucide=\"leaf\" width=\"17\" height=\"17\"><\u002Fi><\u002Fspan>Green cart (organics): {{ hoodDay }}, weekly Apr–Oct<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:18px;border-top:1px solid #E2EFE8;padding-top:16px;\">\n            <sc-if value=\"{{ reminderSet }}\" hint-placeholder-val=\"\">\n              <div style=\"display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:#3F8E6E;\"><span style=\"display:flex;\"><i data-lucide=\"circle-check-big\" width=\"18\" height=\"18\"><\u002Fi><\u002Fspan>Reminder set, we'll nudge you the night before.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ reminderNot }}\" hint-placeholder-val=\"{{ true }}\">\n              <input value=\"{{ remEmail }}\" oninput=\"{{ setRemEmail }}\" type=\"email\" placeholder=\"your@email.com\" style=\"width:100%;font-family:inherit;font-size:14px;border:1px solid #C2D9CC;border-radius:9px;padding:10px 12px;margin-bottom:10px;outline:none;color:#173445;background:#F4FAF6;box-sizing:border-box;\" /><\u002Fbr>\n              <span onclick=\"{{ setReminder }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff;background:#3F8E6E;padding:11px 18px;border-radius:10px;cursor:pointer;\"><i data-lucide=\"bell\" width=\"16\" height=\"16\"><\u002Fi>Set a pickup reminder<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noHood }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#9AA6A2;padding:14px 0;\"><span style=\"display:flex;margin-bottom:10px;\"><i data-lucide=\"map-pin\" width=\"28\" height=\"28\"><\u002Fi><\u002Fspan><span style=\"font-size:14px;\">Choose a neighbourhood to see your<br>collection day and cart schedule.<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section style=\"max-width:1200px;margin:0 auto;padding:18px 28px 44px;\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,240px),1fr));gap:16px;\">\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px;\"><span style=\"width:46px;height:46px;border-radius:12px;background:#EDEFEE;color:#3C4A47;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\"><i data-lucide=\"trash-2\" width=\"23\" height=\"23\"><\u002Fi><\u002Fspan><div style=\"font-weight:700;font-size:16px;color:#173445;margin-bottom:6px;\">Black Cart<\u002Fdiv><div style=\"font-size:13.5px;color:#6B7672;line-height:1.55;\">General garbage, bagged. Collected weekly.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px;\"><span style=\"width:46px;height:46px;border-radius:12px;background:#E5F0F7;color:#2E7DB0;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\"><i data-lucide=\"recycle\" width=\"23\" height=\"23\"><\u002Fi><\u002Fspan><div style=\"font-weight:700;font-size:16px;color:#173445;margin-bottom:6px;\">Blue Cart<\u002Fdiv><div style=\"font-size:13.5px;color:#6B7672;line-height:1.55;\">Paper, plastics 1–7, glass &amp; cans. Every other week.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px;\"><span style=\"width:46px;height:46px;border-radius:12px;background:#E9F3EC;color:#3F8E6E;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\"><i data-lucide=\"leaf\" width=\"23\" height=\"23\"><\u002Fi><\u002Fspan><div style=\"font-weight:700;font-size:16px;color:#173445;margin-bottom:6px;\">Green Cart<\u002Fdiv><div style=\"font-size:13.5px;color:#6B7672;line-height:1.55;\">Food scraps, yard &amp; pet waste. Collected weekly.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px;\"><span style=\"width:46px;height:46px;border-radius:12px;background:#F7EFDF;color:#C98A2E;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\"><i data-lucide=\"truck\" width=\"23\" height=\"23\"><\u002Fi><\u002Fspan><div style=\"font-weight:700;font-size:16px;color:#173445;margin-bottom:6px;\">Transfer Site<\u002Fdiv><div style=\"font-size:13.5px;color:#6B7672;line-height:1.55;\">Large &amp; special waste. 7 km west on Hwy 567, Mon–Sat.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===================== TRANSIT PAGE ===================== -->\n  <sc-if value=\"{{ isTransit }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"max-width:1200px;margin:0 auto;padding:38px 28px 6px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:7px;background:#F7EFDF;color:#B07C24;font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;margin-bottom:16px;\"><i data-lucide=\"bus\" width=\"14\" height=\"14\"><\u002Fi>6 routes · schedules on screen, no PDFs<\u002Fspan>\n    <h1 style=\"font-family:'Bri ax(min(100%,440px),1fr));gap:14px;\">\n            <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n              <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px 22px;display:flex;flex-direction:column;gap:8px;\">\n                <div style=\"font-weight:700;font-size:16px;color:#173445;\">{{ it.title }}<\u002Fdiv>\n                <p style=\"margin:0;font-size:13.5px;line-height:1.55;color:#6B7672;\">{{ it.desc }}<\u002Fp>\n                <span style=\"margin-top:4px;display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:#1E5677;cursor:pointer;\">{{ it.link }}<i data-lucide=\"arrow-up-right\" width=\"15\" height=\"15\"><\u002Fi><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===================== ABOUT PAGE ===================== -->\n  <sc-if value=\"{{ showVolunteerLive }}\" hint-placeholder-val=\"{{ true }}\"><section style=\"background:#FBF7F0;min-height:calc(100vh - 68px);\"><div style=\"max-width:840px;margin:0 auto;padding:38px 24px 60px;\"><div style=\"display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;\"><span style=\"display:inline-flex;align-items:center;gap:7px;background:#E5EEF4;color:#1E5677;font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;\"><i data-lucide=\"heart\" width=\"14\" height=\"14\"><\u002Fi>Community Partnership<\u002Fspan><span style=\"font-size:13px;color:#8A9BA8;\">Expires August 24, 2026<\u002Fspan><\u002Fdiv><h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(26px,5.5vw,36px);letter-spacing:-.025em;color:#173445;margin:0 0 8px;\">Top 10 volunteer opportunities<\u002Fh1><p style=\"font-size:16px;color:#5C6B75;margin:0 0 28px;\">July / August 2026 &middot; Shared by <strong style=\"color:#1E5677;\">Volunteer Airdrie<\u00 r-radius:999px;border:1px solid #DDE5EC;\">Flexible scheduling<\u002Fspan> <span style=\"display:inline-block;background:#E6F5EE;color:#1A7A4A;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;border:1px solid #C3E8D4;\">Youth/family friendly<\u002Fspan><\u002Fdiv><div><a href=\"https://volunteerairdrie.ca/litter-league/\" style=\"color:#1E5677;font-size:13px;font-weight:500;\">volunteerairdrie.ca/litter-league/<\u002Fa><\u002Fdiv><\u002Fdiv><\u002Fdiv><p style=\"font-size:12px;color:#8A9BA8;margin-top:20px;padding-top:16px;border-top:1px solid #E0E8ED;line-height:1.6;\">Please mention hearing about the role on the Top 10 when you reach out. Content provided by Volunteer Airdrie &mdash; <a href=\"https://volunteerairdrie.ca\" style=\"color:#1E5677;\">volunteerairdrie.ca<\u002Fa><\u002Fp><\u002Fdiv><\u002Fsection></sc-if>\n<sc-if value=\"{{ showVolunteerExpired }}\" hint-placeholder-val=\"{{ true }}\"><section style=\"background:#FBF7F0;min-height:calc(100vh - 68px);\"><div style=\"max-width:840px;margin:0 auto;padding:38px 24px 60px;\"><div style=\"display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;\"><span style=\"display:inline-flex;align-items:center;gap:7px;background:#E5EEF4;color:#1E5677;font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;\"><i data-lucide=\"heart\" width=\"14\" height=\"14\"><\u002Fi>Community Partnership<\u002Fspan><span style=\"font-size:13px;color:#8A9BA8;\">Expires August 24, 2026<\u002Fspan><\u002Fdiv><h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(26px,5.5vw,36px);letter-spacing:-.025em;color:#173445;margin:0 0 8px;\">Top 10 volunteer opportunities<\u002Fh1><p style=\"font-size:16px;color:#5C6B75;margin:0 0 28px;\">July / August 2026 &middot; Shared by <strong style=\"color:#1E5677;\">Volunteer Airdrie<\u002Fstrong><\u002Fp><div style=\"background:#fff;border:1px solid #E0E8ED;border-radius:14px;padding:32px 24px;text-align:center;\"><p style=\"font-size:17px;font-weight:700;color:#173445;margin:0 0 8px;\">This listing has expired<\u002Fp><p style=\"font-size:14px;color:#5C6B75;margin:0;\">For current opportunities visit <a href=\"https://volunteerairdrie.ca\" style=\"color:#1E5677;font-weight:600;\">volunteerairdrie.ca<\u002Fa><\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsection></sc-if>\n<sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"max-width:840px;margin:0 auto;padding:38px 28px 6px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:7px;background:#E5EEF4;color:#1E5677;font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;margin-bottom:16px;\"><i data-lucide=\"heart\" width=\"14\" height=\"14\"><\u002Fi>An independent community project<\u002Fspan>\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(29px,6.5vw,42px);letter-spacing:-.025em;color:#173445;margin:0 0 18px;\">About Our Airdrie<\u002Fh1>\n    <p style=\"font-size:17px;line-height:1.65;color:#465450;margin:0 0 18px;\">Our Airdrie is a single place for residents to find what they need without hunting across five different websites. Type a question in plain English, “when's the next bus to Calgary,” “what day is recycling in Windsong,” “plumber near me”, and get an answer, not a link to a PDF.<\u002Fp>\n    <p style=\"font-size:17px;line-height:1.65;color:#465450;margin:0 0 30px;\">It covers a searchable business directory, a community events calendar, transit schedules for all 6 routes, garbage and recycling by neighbourhood, free programs and daily weather. Everything is specific to Airdrie, no generic national filler.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,300px),1fr));gap:14px;margin-bottom:36px;\">\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px;\"><span style=\"color:#1E5677;display:flex;margin-bottom:10px;\"><i data-lucide=\"bus\" width=\"24\" height=\"24\"><\u002Fi><\u002Fspan><div style=\"font-weight:700;font-size:15.5px;color:#173445;margin-bottom:5px;\">No PDF downloads<\u002Fdiv><div style=\"font-size:13px;color:#6B7672;line-height:1.5;\">All 6 transit routes built right into the page.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px;\"><span style=\"color:#3F8E6E;display:flex;margin-bottom:10px;\"><i data-lucide=\"recycle\" width=\"24\" height=\"24\"><\u002Fi><\u002Fspan><div style=\"font-weight:700;font-size:15.5px;color:#173445;margin-bottom:5px;\">All 44 neighbourhoods<\u002Fdiv><div style=\"font-size:13px;color:#6B7672;line-height:1.5;\">Collection days and cart schedules in one place.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:20px;\"><span style=\"color:#E07A4F;display:flex;margin-bottom:10px;\"><i data-lucide=\"map-pin\" width=\"24\" height=\"24\"><\u002Fi><\u002Fspan><div style=\"font-weight:700;font-size:15.5px;color:#173445;margin-bottom:5px;\">Airdrie first<\u002Fdiv><div style=\"font-size:13px;color:#6B7672;line-height:1.5;\">Built to grow with the city toward 100,000 residents.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;color:#173445;margin:0 0 16px;\">Frequently asked questions<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:10px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <details style=\"background:#fff;border:1px solid #EAE2D3;border-radius:14px;padding:4px 20px;\">\n          <summary style=\"cursor:pointer;list-style:none;padding:16px 0;font-weight:600;font-size:15.5px;color:#173445;display:flex;align-items:center;justify-content:space-between;gap:12px;\">{{ f.q }}<span style=\"color:#9AA6A2;display:flex;flex-shrink:0;\"><i data-lucide=\"plus\" width=\"18\" height=\"18\"><\u002Fi><\u002Fspa mail a week with new businesses, events and deals.<\u002Fp>\n        <input type=\"text\" value=\"{{ subEmail }}\" oninput=\"{{ setSubEmail }}\" placeholder=\"you@email.com\" style=\"width:100%;font-family:inherit;font-size:14.5px;border:1px solid #E0D7C7;border-radius:11px;padding:12px 14px;margin-bottom:10px;outline:none;color:#22302E;background:#FBF7F0;\">\n        <button style=\"width:100%;border:none;background:#1E5677;color:#fff;font-family:inherit;font-weight:600;font-size:14.5px;padding:12px;border-radius:11px;cursor:pointer;\" onclick=\"{{ subscribe }}\">Notify me<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:18px;padding:24px;\">\n        <span style=\"width:44px;height:44px;border-radius:12px;background:#FBEBE2;color:#E07A4F;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\"><i data-lucide=\"store\" width=\"22\" height=\"22\"><\u002Fi><\u002Fspan>\n        <div style=\"font-weight:700;font-size:17px;color:#173445;margin-bottom:5px;\">List your business free<\u002Fdiv>\n        <p style=\"margin:0 0 16px;font-size:13.5px;color:#6B7672;line-height:1.5;\">Add your business to the directory at no cost. Takes under a minute.<\u002Fp>\n        <input type=\"text\" placeholder=\"Business name\" style=\"width:100%;font-family:inherit;font-size:14.5px;border:1px solid #E0D7C7;border-radius:11px;padding:12px 14px;margin-bottom:10px;outline:none;color:#22302E;background:#FBF7F0;\">\n        <button style=\"width:100%;border:none;background:#E07A4F;color:#fff;font-family:inherit;font-weight:600;font-size:14.5px;padding:12px;border-radius:11px;cursor:pointer;\">Add my business<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:18px;padding:24px;\">\n        <span style=\"width:44px;height:44px;border-radius:12px;background:#FBEBE2;color:#E07A4F;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\"><i data-lucide=\"calendar-plus\" width=\"22\" height=\"22\"><\u002Fi><\u002Fspan>\n        <div style=\"font-weight:700;font-size:17px;color:#173445;margin-bottom:5px;\">Submit an event<\u002Fdiv>\n        <p style=\"margin:0 0 16px;font-size:13.5px;color:#6B7672;line-height:1.5;\">Found something happening that should be on our calendar? Tell us.<\u002Fp>\n        <input type=\"text\" placeholder=\"Event name &amp; date\" style=\"width:100%;font-family:inherit;font-size:14.5px;border:1px solid #E0D7C7;border-radius:11px;padding:12px 14px;margin-bottom:10px;outline:none;color:#22302E;background:#FBF7F0;\">\n        <button style=\"width:100%;border:none;background:#1E5677;color:#fff;font-family:inherit;font-weight:600;font-size:14.5px;padding:12px;border-radius:11px;cursor:pointer;\">Submit event<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:18px;padding:24px;\">\n        <span style=\"width:44px;height:44px;border-radius:12px;background:#E5EEF4;color:#1E5677;display:flex;align-items:center;justify-content:center;margin-bottom:14px;\"><i data-lucide=\"lightbulb\" width=\"22\" height=\"22\"><\u002Fi><\u002Fspan>\n        <div style=\"font-weight:700;font-size:17px;color:#173445;margin-bottom:5px;\">Suggest something<\u002Fdiv>\n        <p style=\"margin:0 0 16px;font-size:13.5px;color:#6B7672;line-height:1.5;\">Missing a feature or found something confusing? No idea is too small.<\u002Fp>\n        <input type=\"text\" placeholder=\"Your idea\" style=\"width:100%;font-family:inherit;font-size:14.5px;border:1px solid #E0D7C7;border-radius:11px;padding:12px 14px;margin-bottom:10px;outline:none;color:#22302E;background:#FBF7F0;\">\n        <button style=\"width:100%;border:none;background:#1E5677;color:#fff;font-family:inherit;font-weight:600;font-size:14.5px;padding:12px;border-radius:11px;cursor:pointer;\">Send suggestion<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===================== WEATHER PAGE ===================== -->\n  <sc-if value=\"{{ isWeather }}\" hint-placeholder-val=\"\">\n  <div style=\"background:linear-gradient(165deg,#E5F0F7,#FBF7F0 70%);border-bottom:1px solid #E6EDF1;\">\n  <section style=\"max-width:1000px;margin:0 auto;padding:38px 28px 30px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:7px;background:#fff;color:#2E7DB0;font-weight:600;font-size:13px;padding:6px 13px;border-radius:999px;margin-bottom:16px;border:1px solid #D7E6F0;\"><i data-lucide=\"cloud-sun\" width=\"14\" height=\"14\"><\u002Fi>Updated daily for Airdrie<\u002Fspan>\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(29px,6.5vw,42px);letter-spacing:-.025em;color:#173445;margin:0 0 8px;\">Weather &amp; Closures<\u002Fh1>\n    <p style=\"font-size:16.5px;color:#52605C;margin:0 0 24px;max-width:560px;\">Today's conditions, the week ahead, and every active road and facility closure around Airdrie in one place.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #E6EDF1;border-radius:18px;padding:24px 26px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;box-shadow:0 10px 30px rgba(46,125,176,.10);\">\n      <span style=\"color:#E8A13C;display:flex;\"><i data-lucide=\"sun\" width=\"60\" height=\"60\"><\u002Fi><\u002Fspan>\n      <div>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:46px;color:#173445;line-height:1;\">{{ weatherNow.temp }}<\u002Fdiv>\n        <div style=\"font-size:15px;color:#6B7672;margin-top:5px;\">{{ weatherNow.label }} · feels like {{ weatherNow.feels }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-left:auto;display:flex;gap:28px;flex-wrap:wrap;\">\n        <div><div style=\"font-size:12px;color:#9AA6A2;font-weight:600;letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px;\">Wind<\u002Fdiv><div style=\"font-size:15px;font-weight:600;color:#173445;\">{{ weatherNow.wind }}<\u0 ex-wrap:wrap;margin-bottom:16px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(20px,4vw,24px);color:#173445;margin:0;\">Active road &amp; facility closures<\u002Fh2>\n      <a href=\"https://www.airdrie.ca/index.cfm?serviceID=1896\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:#1E5677;\">City's live closure map<i data-lucide=\"arrow-up-right\" width=\"15\" height=\"15\"><\u002Fi><\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <sc-for list=\"{{ closuresList }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid #EAE2D3;border-radius:16px;padding:18px 20px;display:flex;align-items:flex-start;gap:15px;\">\n          <span style=\"width:42px;height:42px;border-radius:11px;background:#FCEFE0;color:#C98A2E;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><i data-lucide=\"{{ c.icon }}\" width=\"21\" height=\"21\"><\u002Fi><\u002Fspan>\n          <div><div style=\"font-weight:700;font-size:15.5px;color:#173445;margin-bottom:3px;\">{{ c.title }}<\u002Fdiv><div style=\"font-size:13.5px;color:#6B7672;line-height:1.5;\">{{ c.detail }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <footer style=\"margin-top:54px;background:#14303F;color:#AEC6D2;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:46px 28px 30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,160px),1fr));gap:32px;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:13px;\">\n          <img src=\"a047683b-4c0b-49ff-8cf2-67201d327e92\" alt=\"Our Airdrie\" width=\"36\" height=\"36\" style=\"display:block;border-radius:50%;\">\n          <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-weigh rgba(255,255,255,.09);\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:18px 28px;font-size:12.5px;color:#7C9AAA;\">© 2026 Our Airdrie&nbsp;<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this.renderIcons();\n    try { const h = window.localStorage.getItem(\"oa_hood\"); if (h) this.setState({ hood: h }); } catch (e) {}\n    try { const l = window.localStorage.getItem(\"oa_lang\"); if (l) this.setState({ lang: l }); } catch (e) {}\n    this._onResize = () => {\n      const m = window.innerWidth < 980;\n      if (m !== this.state.isMobile) this.setState({ isMobile: m, menuOpen: false });\n    };\n    window.addEventListener(\"resize\", this._onResize);\n    this._loadSupabase();\n    this._loadWeather();\n    const _phs = [\"Try “recycling day in Windsong”\",\"Try “garbage pickup schedule”\",\"Try “free events this weekend”\",\"Try “parks near me”\",\"Try “transit to Calgary”\",\"Try “Italian restaurants”\"];\n    let _phi = 0;\n    this.setState({ searchPlaceholder: _phs[0] });\n    setInterval(() => { _phi = (_phi + 1) % _phs.length; this.setState({ searchPlaceholder: _phs[_phi] }); }, 2000);\n  }\n  async _loadWeather() {\n    try {\n      const r = await fetch(\"https://api.open-meteo.com/v1/forecast?latitude=51.2917&longitude=-114.0144&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,relativehumidity_2m,apparent_temperature&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=America%2FEdmonton&forecast_days=5\");\n      const d = await r.json();\n      const wc = (c) => {\n        if (c===0) return {icon:\"sun\",label:\"Sunny\"};\n        if (c<=2) return {icon:\"cloud-sun\",label:\"Partly Cloudy\"};\n        if (c===3) return {icon:\"cloud\",label:\"Overcast\"};\n        if (c<=48) return {icon:\"cloud\",label:\"Foggy\"};\n        if (c<=55) return {icon:\"cloud-drizzle\",label:\"Drizzle\"};\n        if (c<=65) return {icon:\"cloud-rain\",label:\"Rain\"};\n        if (c<=77) return {icon:\"snowflake\",label:\"Snow\"};\n        if (c<=82) return {icon:\"cloud-rain\",label:\"Showers\"};\n        if (c<=86) return {icon:\"cloud-snow\",label:\"Snow Showers\"};\n        return {icon:\"cloud-lightning\",label:\"Thunderstorm\"};\n      };\n      const dir = (deg) => [\"N\",\"NE\",\"E\",\"SE\",\"S\",\"SW\",\"W\",\"NW\"][Math.round(deg/45)%8];\n      const dnames = [\"Sun\",\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"];\n      const cur = d.current;\n      const weatherNow = { temp: Math.round(cur.temperature_2m)+\"°C\", label: wc(cur.weathercode).label, feels: Math.round(cur.apparent_temperature)+\"°\", wind: Math.round(cur.windspeed_10m)+\" km/h \"+dir(cur.winddirection_10m), hum: cur.relativehumidity_2m+\"%\", uv: \"\" };\n      const weatherDays = d.daily.time.map((t,i) => { const dt=new Date(t+\"T00:00:00\"); const w=wc(d.daily.weathercode[i]); return { day: i===0?\"Today\":dnames[dt.getDay()], icon: w.icon, hi: Math.round(d.daily.temperature_2m_max[i])+\"°\", lo: Math.round(d.daily.temperature_2m_min[i])+\"°\", label: w.label }; });\n      this.setState({ weatherNow, weatherDays });\n    } catch(err) { console.warn(\"Weather:\",err); }\n  }\n  async _loadSupabase() {\n    const BASE = \"https://qehxqhgpypublcqxocgt.supabase.co/rest/v1\";\n    const KEY = \"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlaHhxaGdweXB1YmxjcXhvY2d0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjMwMzgwNSwiZXhwIjoyMDk3ODc5ODA1fQ.jho-ZfwXh6H5umc4W-Q3uYlWEelulpqFjWHMBq2BCMA\";\n    const h = { apikey: KEY, Authorization: \"Bearer \" + KEY };\n    const today = new Date().toISOString().slice(0,10);\n    try {\n      const [evRes, bizRes] = await Promise.all([\n        fetch(BASE + \"/events?select=*&event_date=gte.\" + today + \"&order=event_date&limit=50\", { headers: h }),\n        fetch(BASE + \"/businesses?select=name,category,address,phone,website&order=name&limit=500\", { headers: h })\n      ]);\n      const evData = await evRes.json();\n      const bizData = await bizRes.json();\n      const mn = [\"JAN\",\"FEB\",\"MAR\",\"APR\",\"MAY\",\"JUN\",\"JUL\",\"AUG\",\"SEP\",\"OCT\",\"NOV\",\"DEC\"];\n      const WD = [\"Sun\",\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"];\n      const tag = (n,d) => { const t=(n+\" \"+(d||\"\")).toLowerCase(); if(/kid|family|child|youth|parade|festival|fair|fireworks|canada|rhyme|song|storytime|junior|toddler|reading club/.test(t)) return \"Family\"; if(/\\bmarket\\b|vendor|maker/.test(t)) return \"Market\"; if(/hockey|soccer|\\brun\\b|skate|sport|rodeo|golf|tournament|triathlon|marathon|cycling|swim/.test(t)) return \"Sports\"; if(/concert|music|\\barts?\\b|theatre|comedy|film|open mic|atelier|karaoke|watercolour|watercolor|painting|drawing|knit|sew|craft|gallery|improv|performance/.test(t)) return \"Arts\"; if(/volunteer|community|fundrais|senior|breakfast|stampede|coffee|scavenger|networking|charity/.test(t)) return \"Community\"; return \"Event\"; };\n      const events = evData.slice(0,4).map(e => { const d=new Date(e.event_date+\"T00:00:00\"); return {day:String(d.getDate()).padStart(2,\"0\"),mon:mn[d.getMonth()],tag:tag(e.name,e.description),title:e.name,place:e.venue||\"\"}; });\n      const eventsFull = evData.map(e => { const d=new Date(e.event_date+\"T00:00:00\"); const isFree=!!(e.is_free||(e.name+\" \"+(e.description||\"\")).toLowerCase().includes(\"free\")); return {date:e.event_date,day:String(d.getDate()).padStart(2,\"0\"),mon:mn[d.getMonth()],weekday:WD[d.getDay()],tag:tag(e.name,e.description),free:isFree,time:e.event_time||\"\",title:e.name,place:e.venue||\"\",desc:e.description||\"\",cost:e.cost||\"\",reg:e.registration_required||\"\",url:e.url||\"\",organizer:e.organizer||\"\"}; });\n      const listings = bizData.slice(0,8).map((b,i) => { const ic={\"Home & Trade Services\":\"wrench\",\"Restaurants & Food\":\"utensils\",\"Health & Wellness\":\" outes & schedules\", \"transit\");\n    else if (/event|weekend|happening|festival|canada day|market|concert|rodeo|kids/.test(s)) a = A(\"calendar-days\", \"#FBEBE2\", \"#E07A4F\", \"What's on in Airdrie\", \"From the Canada Day celebration to the weekly farmers' market and free public skating, here's what's coming up around the city.\", \"Browse events\", \"events\");\n    else if (/weather|closure|road|construction|forecast|temperature/.test(s)) a = A(\"cloud-sun\", \"#E5F0F7\", \"#2E7DB0\", \"Weather & closures\", \"It's 22\\u00B0C and sunny in Airdrie today. A few road closures are active around Main Street and 24th Street.\", \"See weather & closures\", \"weather\");\n    else if (s.trim()) {\n      this.setState({ query: q, searchAnswer: A('store', '#E5EEF4', '#1E5677', 'Searching...', 'Looking for Airdrie businesses...', 'Browse directory', 'directory') });\n      try {\n        const _r = await fetch('https://qehxqhgpypublcqxocgt.supabase.co/rest/v1/businesses?select=name,category&or=(name.ilike.*' + encodeURIComponent(s) + '*,category.ilike.*' + encodeURIComponent(s) + '*)&order=name&limit=6', { headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlaHhxaGdweXB1YmxjcXhvY2d0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjMwMzgwNSwiZXhwIjoyMDk3ODc5ODA1fQ.jho-ZfwXh6H5umc4W-Q3uYlWEelulpqFjWHMBq2BCMA', 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlaHhxaGdweXB1YmxjcXhvY2d0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjMwMzgwNSwiZXhwIjoyMDk3ODc5ODA1fQ.jho-ZfwXh6H5umc4W-Q3uYlWEelulpqFjWHMBq2BCMA' } });\n        const _d = await _r.json();\n        if (Array.isArray(_d) && _d.length > 0) {\n          const _top = _d.slice(0,3).map(b => b.name).join(', ');\n          const _rest = _d.length > 3 ? ' and ' + (_d.length - 3) + ' more' : '';\n          this.setState({ searchAnswer: A('store', '#E5EEF4', '#1E5677', _d.length + ' local businesses', _top + _rest + '.', 'See all results
